{% load static %}

<!DOCTYPE HTML>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="description" content="HEX Shop — Pakistan's growing online shopping platform for fashion, accessories and more.">

<title>{% block title %}HEX Shop | Online Shopping Platform{% endblock %}</title>

<link href="{% static 'images/logo.png' %}" rel="shortcut icon" type="image/x-icon">

<!-- Bootstrap 4 CSS -->
<link href="{% static 'css/bootstrap.css' %}" rel="stylesheet" type="text/css"/>

<!-- Font Awesome 5 -->
<link href="{% static 'fonts/fontawesome/css/all.min.css' %}" type="text/css" rel="stylesheet">

<!-- Custom styles -->
<link href="{% static 'css/ui.css' %}" rel="stylesheet" type="text/css"/>
<link href="{% static 'css/responsive.css' %}" rel="stylesheet" media="only screen and (max-width: 1200px)"/>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    body { font-family: 'Poppins', sans-serif; }
    .card { border: none; box-shadow: 0 2px 8px rgba(0,0,0,.08); border-radius: 8px; }
    .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,.15); transform: translateY(-2px); transition: all .2s; }
    .btn-primary { border-radius: 4px; }
    .navbar { box-shadow: 0 2px 6px rgba(0,0,0,.07); }
    .section-title { font-weight: 600; }
    .badge-notify { position: absolute; top: -6px; right: -6px; font-size: 10px; }
    footer { background: #1a1a2e; color: #ccc; }
    footer a { color: #aaa; }
    footer .text-muted { color: #aaa !important; }
    .alert { border-radius: 6px; }
</style>
</head>

<body>

{% include 'includes/navbar.html' %}

<div class="container mt-2" style="min-height: 0;">
    {% include 'includes/alerts.html' %}
</div>

{% block content %}
{% endblock %}

{% include 'includes/footer.html' %}

<!-- jQuery -->
<script src="{% static 'js/jquery-2.0.0.min.js' %}" type="text/javascript"></script>
<!-- Bootstrap 4 JS -->
<script src="{% static 'js/bootstrap.bundle.min.js' %}" type="text/javascript"></script>
<!-- Custom JS -->
<script src="{% static 'js/script.js' %}" type="text/javascript"></script>

</body>
</html>
